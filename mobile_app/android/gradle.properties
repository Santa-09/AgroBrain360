# Enable AndroidX
android.useAndroidX=true
android.enableJetifier=true

# Gradle stability on Windows
org.gradle.daemon=false
org.gradle.parallel=false
org.gradle.caching=true
org.gradle.workers.max=2
org.gradle.vfs.watch=false

# Keep Gradle heap moderate so the JVM still has native memory available.
# The previous larger heap caused JVM native-memory OOMs, which then left
# missing intermediate files behind for Kotlin and manifest packaging.
org.gradle.jvmargs=-Xmx2048m -Xms256m -XX:MaxMetaspaceSize=512m -XX:ReservedCodeCacheSize=128m -XX:HeapBaseMinAddress=1G -Dfile.encoding=UTF-8

# Kotlin / Gradle stability
# On Windows, plugin compilation can intermittently fail while writing
# incremental snapshot files inside build intermediates. These settings
# trade some build speed for more reliable local debug builds.
kotlin.incremental=false
kotlin.incremental.useClasspathSnapshot=false
kotlin.caching.enabled=false
kotlin.compiler.execution.strategy=in-process
kotlin.daemon.enabled=false
