services:
  - type: web
    name: agrobrain-backend
    env: python
    rootDir: backend
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn main:app --host 0.0.0.0 --port $PORT
    plan: free
    envVars:
      - key: PYTHON_VERSION
        value: 3.11.9
      - key: APP_ENV
        value: production
      - key: ALGORITHM
        value: HS256
      - key: ACCESS_TOKEN_EXPIRE_MINUTES
        value: "1440"
      - key: OTP_EXPIRY_MINUTES
        value: "5"
      - key: OTP_RESEND_COOLDOWN_SECONDS
        value: "60"
      - key: PASSWORD_RESET_TOKEN_EXPIRE_MINUTES
        value: "10"
      - key: SMTP_PORT
        value: "587"
      - key: SMTP_USE_TLS
        value: "true"
